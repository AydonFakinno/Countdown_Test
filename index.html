<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #121212;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 2rem;
      color: #e0e0e0;
    }

    .countdown-container {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .time-box {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.5rem;
      min-width: 90px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
    }

    .number {
      font-size: 2.5rem;
      font-weight: bold;
      color: #00e5ff;
    }

    .label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      margin-top: 0.5rem;
    }

    .message {
      font-size: 1.5rem;
      color: #00e676;
      display: none;
    }
  </style>
</head>
<body>

  <h1 id="title">Countdown to Something Special</h1>

  <div class="countdown-container" id="countdown">
    <div class="time-box">
      <div class="number" id="days">00</div>
      <div class="label">Days</div>
    </div>
    <div class="time-box">
      <div class="number" id="hours">00</div>
      <div class="label">Hours</div>
    </div>
    <div class="time-box">
      <div class="number" id="minutes">00</div>
      <div class="label">Minutes</div>
    </div>
    <div class="time-box">
      <div class="number" id="seconds">00</div>
      <div class="label">Seconds</div>
    </div>
  </div>

  <div class="message" id="finished-message">The wait is over! 🎉</div>

  <script>
    // SET YOUR TARGET DATE & TIME HERE (YYYY-MM-DDTHH:MM:SS format)
    const targetDate = new Date("2026-12-31T00:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance < 0) {
        document.getElementById("countdown").style.display = "none";
        document.getElementById("title").style.display = "none";
        document.getElementById("finished-message").style.display = "block";
        clearInterval(timerInterval);
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").innerText = String(days).padStart(2, '0');
      document.getElementById("hours").innerText = String(hours).padStart(2, '0');
      document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
      document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
    }

    const timerInterval = setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
