<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacked Reveal with Depixelation</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d0d0d;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* -----------------------------------------------------------
       1. The Stacked Image Stage
       ----------------------------------------------------------- */
    .stage-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    /* Base Layers */
    .layer-bg  { z-index: 1; }
    .layer-shl { z-index: 2; }

    /* Animated Character Layers */
    .layer-char {
      opacity: 0;
      filter: blur(25px) contrast(150%); /* Start heavily blurred/obscured */
      -webkit-filter: blur(25px) contrast(150%);
      animation-name: revealAndFocus;
      animation-duration: 20s; /* 20 seconds total reveal per character */
      animation-fill-mode: forwards;
      animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Staggered Timings */
    .layer-drd { 
      z-index: 3; 
      animation-delay: 0s; /* Doctor Doom: 0s to 20s */
    }

    .layer-spm { 
      z-index: 4; 
      animation-delay: 20s; /* Spider-Man: 20s to 40s */
    }

    .layer-cap { 
      z-index: 5; 
      animation-delay: 40s; /* Captain America: 40s to 60s */
    }

    /* -----------------------------------------------------------
       2. The Depixelize / Focus Keyframes
       ----------------------------------------------------------- */
    @keyframes revealAndFocus {
      0% {
        opacity: 0;
        filter: blur(30px) contrast(200%);
        -webkit-filter: blur(30px) contrast(200%);
        transform: scale(1.05); /* Slightly enlarged/distorted */
      }
      50% {
        opacity: 0.6;
        filter: blur(15px) contrast(130%); /* Color starts bleeding through, shape still hidden */
        -webkit-filter: blur(15px) contrast(130%);
      }
      100% {
        opacity: 1;
        filter: blur(0px) contrast(100%); /* Completely sharp and clear */
        -webkit-filter: blur(0px) contrast(100%);
        transform: scale(1);
      }
    }

    /* -----------------------------------------------------------
       3. Floating UI Container
       ----------------------------------------------------------- */
    .ui-overlay {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
      color: #f0f0f0;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .countdown-container {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .time-box {
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.2rem;
      min-width: 85px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
    }

    .number {
      font-size: 2.5rem;
      font-weight: bold;
      color: #00e5ff;
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.4);
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      margin-top: 0.4rem;
    }

    .message {
      font-size: 2.2rem;
      font-weight: bold;
      color: #00e676;
      display: none;
      text-shadow: 0 0 15px rgba(0, 230, 118, 0.5);
    }
  </style>
</head>
<body>

  <div class="stage-container">
    <!-- BASE LAYERS -->
    <img src="bg.jpg"  alt="Background" class="layer layer-bg">
    <img src="shl.png" alt="Silhouette" class="layer layer-shl">

    <!-- CHARACTER LAYERS (WITH BLUR/DEPIXEL EFFECT) -->
    <img src="drd.png" alt="Doctor Doom" class="layer layer-char layer-drd">
    <img src="spm.png" alt="Spider-Man" class="layer layer-char layer-spm">
    <img src="cap.png" alt="Captain America" class="layer layer-char layer-cap">

    <!-- FLOATING UI ON TOP -->
    <div class="ui-overlay">
      <h1 id="title">A Waiting Game...</h1>

      <div class="countdown-container" id="countdown">
        <div class="time-box">
          <div class="number" id="minutes">00</div>
          <div class="label">Minutes</div>
        </div>
        <div class="time-box">
          <div class="number" id="seconds">00</div>
          <div class="label">Seconds</div>
        </div>
      </div>

      <div class="message" id="finished-message">ASSEMBLED! 💥</div>
    </div>
  </div>

  <script>
    // 60-second timer for testing (20s per character)
    const targetDate = new Date(Date.now() + 1 * 60 * 1000).getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.getElementById("countdown").style.display = "none";
        document.getElementById("title").style.display = "none";
        document.getElementById("finished-message").style.display = "block";
        clearInterval(timerInterval);
        return;
      }

      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
      document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
    }

    const timerInterval = setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
