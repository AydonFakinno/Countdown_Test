<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacked Reveal</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d0d0d;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* -----------------------------------------------------------
       1. The Stacked Image Stage
       ----------------------------------------------------------- */
    .stage-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* All layer images stretch to fit full stage and sit on top of each other */
    .layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* Keeps proportions clean */
      pointer-events: none; /* Allows clicks/scans to go through */
    }

    /* Layer Stacking Order (z-index) */
    .layer-bg  { z-index: 1; }
    .layer-shl { z-index: 2; }
    .layer-drd { z-index: 3; }
    .layer-spm { z-index: 4; }
    .layer-cap { z-index: 5; }

    /* -----------------------------------------------------------
       2. Floating UI Container (Sitting on top of all layers)
       ----------------------------------------------------------- */
    .ui-overlay {
      position: relative;
      z-index: 10; /* Above all images */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
      color: #f0f0f0;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .countdown-container {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .time-box {
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.2rem;
      min-width: 85px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
    }

    .number {
      font-size: 2.5rem;
      font-weight: bold;
      color: #00e5ff;
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.4);
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      margin-top: 0.4rem;
    }

    .message {
      font-size: 2.2rem;
      font-weight: bold;
      color: #00e676;
      display: none;
      text-shadow: 0 0 15px rgba(0, 230, 118, 0.5);
    }
  </style>
</head>
<body>

  <div class="stage-container">
    <!-- STACKED LAYERS (ORDER: BG -> SHL -> DRD -> SPM -> CAP) -->
    <img src="bg.jpg"  alt="Background" class="layer layer-bg">
    <img src="shl.png" alt="Silhouette" class="layer layer-shl">
    <img src="drd.png" alt="Doctor Doom" class="layer layer-drd">
    <img src="spm.png" alt="Spider-Man" class="layer layer-spm">
    <img src="cap.png" alt="Captain America" class="layer layer-cap">

    <!-- FLOATING UI ON TOP -->
    <div class="ui-overlay">
      <h1 id="title">A Waiting Game...</h1>

      <div class="countdown-container" id="countdown">
        <div class="time-box">
          <div class="number" id="minutes">00</div>
          <div class="label">Minutes</div>
        </div>
        <div class="time-box">
          <div class="number" id="seconds">00</div>
          <div class="label">Seconds</div>
        </div>
      </div>

      <div class="message" id="finished-message">ASSEMBLED! 💥</div>
    </div>
  </div>

  <script>
    // Test countdown set to 1 minute from load
    const targetDate = new Date(Date.now() + 1 * 60 * 1000).getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.getElementById("countdown").style.display = "none";
        document.getElementById("title").style.display = "none";
        document.getElementById("finished-message").style.display = "block";
        clearInterval(timerInterval);
        return;
      }

      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
      document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
    }

    const timerInterval = setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
