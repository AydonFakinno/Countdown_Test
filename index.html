<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixelation Reveal Stage</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d0d0d;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .stage-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .layer-bg  { z-index: 1; }
    .layer-shl { z-index: 2; }

    /* Canvas for pixelated character rendering */
    #character-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }

    /* Floating UI Container */
    .ui-overlay {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
      color: #f0f0f0;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .countdown-container {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .time-box {
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.2rem;
      min-width: 85px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
    }

    .number {
      font-size: 2.5rem;
      font-weight: bold;
      color: #00e5ff;
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.4);
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      margin-top: 0.4rem;
    }

    .message {
      font-size: 2.2rem;
      font-weight: bold;
      color: #00e676;
      display: none;
      text-shadow: 0 0 15px rgba(0, 230, 118, 0.5);
    }
  </style>
</head>
<body>

  <div class="stage-container">
    <!-- BASE LAYERS -->
    <img src="bg.jpg"  alt="Background" class="layer layer-bg">
    <img src="shl.png" alt="Silhouette" class="layer layer-shl">

    <!-- CANVAS WHERE PIXELATED CHARACTERS ARE DRAWN -->
    <canvas id="character-canvas"></canvas>

    <!-- FLOATING UI ON TOP -->
    <div class="ui-overlay">
      <h1 id="title">A Waiting Game...</h1>

      <div class="countdown-container" id="countdown">
        <div class="time-box">
          <div class="number" id="minutes">00</div>
          <div class="label">Minutes</div>
        </div>
        <div class="time-box">
          <div class="number" id="seconds">00</div>
          <div class="label">Seconds</div>
        </div>
      </div>

      <div class="message" id="finished-message">ASSEMBLED! 💥</div>
    </div>
  </div>

  <script>
    // -----------------------------------------------------------
    // 1. Setup Canvas & Load Character Images
    // -----------------------------------------------------------
    const canvas = document.getElementById('character-canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const images = {
      drd: { src: 'drd.png', img: new Image(), loaded: false },
      spm: { src: 'spm.png', img: new Image(), loaded: false },
      cap: { src: 'cap.png', img: new Image(), loaded: false }
    };

    Object.keys(images).forEach(key => {
      images[key].img.src = images[key].src;
      images[key].img.onload = () => images[key].loaded = true;
    });

    // -----------------------------------------------------------
    // 2. Timeline, Pixel Cross-Fading & Smooth Blur Logic
    // -----------------------------------------------------------
    const DURATION_PER_CHAR = 20; // 20 seconds each
    const startTime = Date.now();

    function renderLoop() {
      const elapsed = (Date.now() - startTime) / 1000;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Render Dr. Doom (0s -> 20s)
      drawPixelatedImage(images.drd, elapsed, 0);

      // Render Spider-Man (20s -> 40s)
      drawPixelatedImage(images.spm, elapsed, 20);

      // Render Captain America (40s -> 60s)
      drawPixelatedImage(images.cap, elapsed, 40);

      requestAnimationFrame(renderLoop);
    }

    // Helper to render a pixel layer offscreen with screen-space normalized blur
    function createPixelLayer(img, factor, renderW, renderH, screenBlurPx) {
      const scaledW = Math.max(1, Math.floor(renderW * factor));
      const scaledH = Math.max(1, Math.floor(renderH * factor));

      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = scaledW;
      tempCanvas.height = scaledH;
      const tempCtx = tempCanvas.getContext('2d');
      
      // Convert screen-space blur to buffer-space blur so strength scales smoothly
      const bufferBlur = screenBlurPx * (scaledW / renderW);

      if (bufferBlur > 0.05) {
        tempCtx.filter = `blur(${bufferBlur.toFixed(2)}px)`;
      }
      
      tempCtx.imageSmoothingEnabled = false;
      tempCtx.drawImage(img, 0, 0, scaledW, scaledH);

      return tempCanvas;
    }

    function drawPixelatedImage(imgObj, elapsed, delay) {
      if (!imgObj.loaded) return;

      const charElapsed = elapsed - delay;
      if (charElapsed <= 0) return;

      const progress = Math.min(charElapsed / DURATION_PER_CHAR, 1);
      const overallOpacity = progress;

      // Exponential progression mapping (0 -> 1)
      const expProgress = (Math.pow(10, progress) - 1) / 9; 
      const continuousFactor = 0.012 + Math.pow(expProgress, 4) * 0.988;

      // Discrete step cross-fade
      const stepVal = continuousFactor * 30; 
      const lowerStep = Math.floor(stepVal) / 30;
      const upperStep = Math.ceil(stepVal) / 30;
      const blendRatio = stepVal - Math.floor(stepVal);

      // Quadratic Ease-Out Blur Decay (Smooth dissipation through ~17s / 85% mark)
      let blurPx = 0;
      const blurCutoff = 0.85; 
      if (progress < blurCutoff) {
        const blurProgress = progress / blurCutoff; // 0.0 to 1.0
        blurPx = Math.pow(1 - blurProgress, 2) * 14; 
      }

      const canvasW = canvas.width;
      const canvasH = canvas.height;
      const imgW = imgObj.img.naturalWidth;
      const imgH = imgObj.img.naturalHeight;

      // Object-fit: cover coordinates
      const imgRatio = imgW / imgH;
      const canvasRatio = canvasW / canvasH;

      let renderW, renderH, offsetX, offsetY;

      if (canvasRatio > imgRatio) {
        renderW = canvasW;
        renderH = canvasW / imgRatio;
        offsetX = 0;
        offsetY = (canvasH - renderH) / 2;
      } else {
        renderW = canvasH * imgRatio;
        renderH = canvasH;
        offsetX = (canvasW - renderW) / 2;
        offsetY = 0;
      }

      ctx.save();
      ctx.globalAlpha = overallOpacity;
      ctx.imageSmoothingEnabled = false;

      // Draw Lower Step
      const layer1 = createPixelLayer(imgObj.img, lowerStep, renderW, renderH, blurPx);
      ctx.drawImage(layer1, 0, 0, layer1.width, layer1.height, offsetX, offsetY, renderW, renderH);

      // Blend Upper Step over top
      if (upperStep > lowerStep && blendRatio > 0) {
        ctx.globalAlpha = overallOpacity * blendRatio;
        const layer2 = createPixelLayer(imgObj.img, upperStep, renderW, renderH, blurPx);
        ctx.drawImage(layer2, 0, 0, layer2.width, layer2.height, offsetX, offsetY, renderW, renderH);
      }

      ctx.restore();
    }

    requestAnimationFrame(renderLoop);

    // -----------------------------------------------------------
    // 3. Countdown Timer
    // -----------------------------------------------------------
    const targetDate = new Date(Date.now() + 1 * 60 * 1000).getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.getElementById("countdown").style.display = "none";
        document.getElementById("title").style.display = "none";
        document.getElementById("finished-message").style.display = "block";
        clearInterval(timerInterval);
        return;
      }

      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
      document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
    }

    const timerInterval = setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
